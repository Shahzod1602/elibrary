{% extends "admin/base_site.html" %}

{% block content %}
  <h1>Import books from XLSX</h1>
  <p>Expected columns: <strong>auth</strong>, <strong>title</strong>, <strong>isbn</strong>, <strong>barcode</strong>, <strong>quantiy</strong> (or quantity).</p>
  <form method="post" enctype="multipart/form-data" style="margin-top: 1rem;">
    {% csrf_token %}
    <input type="file" name="xlsx_file" accept=".xlsx" required>
    <button type="submit" class="default" style="margin-left: .5rem;">Import</button>
  </form>
{% endblock %}
